# Configuração para PostgreSQL Local
spring.datasource.url=jdbc:postgresql://localhost:5432/pitchbridge_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate - Criar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
api.security.token.secret=${JWT_SECRET:minha-senha-super-secreta-123}
